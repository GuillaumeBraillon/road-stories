name: CD - Auto Tag & Release

on:
  push:
    branches:
      - main

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Tag and Release
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag v${{ env.VERSION }} déjà présent, on ignore."
          else
            # 1. Extraire les notes du CHANGELOG
            VERSION=${{ env.VERSION }}
            sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | sed '1d;$d' > release_notes.md
            
            # 2. Créer le Tag sur GitHub
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -a "v${{ env.VERSION }}" -m "Version ${{ env.VERSION }}"
            git push origin "v${{ env.VERSION }}"
            
            # 3. Créer la Release via Action (plus simple pour le corps de la release)
            echo "RELEASE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Publish GitHub Release
        if: env.RELEASE_NEEDED == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Version ${{ env.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
